      .banner.nopt { background: rgba(255,59,59,0.08); border: 1px solid rgba(255,59,59,0.2); color: #FF3B3B; }
      .prog-wrap { width: 100%; max-width: 420px; }
      .prog-label { display: flex; justify-content: space-between; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #444; margin-bottom: 6px; }
      .prog-track { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
      .prog-fill { height: 100%; background: #FF3B3B; transition: width 0.4s ease; }
      .mini-score { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 4px; }
      .mini-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 10px; background: rgba(255,255,255,0.03); }
      .perk-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; width: 100%; max-width: 420px; }
      .perk-card { border-radius: 12px; padding: 12px 8px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: all 0.18s; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
      .perk-card:active:not(.used) { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); transform: scale(0.97); }
      .perk-card.used { opacity: 0.25; cursor: default; }
      .perk-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
      .perk-once { font-size: 10px; color: #555; }
      .lb-row { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-radius: 14px; width: 100%; max-width: 420px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); margin-bottom: 8px; }
      .lb-row.scored { background: rgba(52,199,89,0.08); border-color: rgba(52,199,89,0.3); }
      .lb-row.first { background: rgba(255,215,0,0.08); border-color: rgba(255,215,0,0.25); }
      .lb-rank { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; color: #333; width: 22px; text-align: center; }
      .lb-rank.top { color: #FFD700; }
      .lb-pts { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; color: #FF3B3B; margin-left: auto; }
      .lb-row.first .lb-pts { color: #FFD700; }
      .lb-badge { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #34C759; font-weight: 600; margin-left: 6px; }
      .rdots { display: flex; gap: 6px; margin-bottom: 4px; }
      .rdot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.08); }
      .rdot.done { background: #FF3B3B; }
      .rdot.cur { background: rgba(255,59,59,0.4); }
      .tie-note { background: rgba(255,200,0,0.08); border: 1px solid rgba(255,200,0,0.2); border-radius: 12px; padding: 10px 16px; font-size: 13px; color: #FFD700; max-width: 420px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
      .icon-hero { margin-bottom: 4px; }
      .score-row { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-radius: 14px; width: 100%; max-width: 420px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); }
      .score-row.first { background: rgba(255,215,0,0.08); border-color: rgba(255,215,0,0.25); }
      .srank { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; color: #333; width: 18px; }
      .spts { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: #FF3B3B; margin-left: auto; }
      .score-row.first .spts { color: #FFD700; }
      .rules-screen { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; padding: 28px 20px; padding-top: max(28px, env(safe-area-inset-top)); padding-bottom: max(28px, env(safe-area-inset-bottom)); gap: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
      .rsec { width: 100%; max-width: 420px; margin: 0 auto 24px; }
      .rsec-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: #FF3B3B; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
      .rstep { display: flex; gap: 14px; margin-bottom: 14px; align-items: flex-start; }
      .rnum { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: #FF3B3B; width: 24px; flex-shrink: 0; line-height: 1.3; }
      .rtxt { font-size: 14px; line-height: 1.65; color: #888; flex: 1; }
      .perk-rule { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; border-radius: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.03); }
      .perk-rule-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
      .perk-rule-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; margin-bottom: 2px; }
      .perk-rule-desc { font-size: 13px; color: #666; line-height: 1.5; }
      .tip-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; font-size: 13px; color: #888; line-height: 1.6; display: flex; gap: 10px; align-items: flex-start; }
      .rback { display: flex; align-items: center; gap: 8px; background: none; border: none; color: #555; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; padding: 0; margin-bottom: 24px; -webkit-tap-highlight-color: transparent; }
      .scroll-list { width: 100%; max-width: 420px; overflow-y: auto; max-height: 55vh; -webkit-overflow-scrolling: touch; }
    `;

    function App() {
      const [lang, setLang] = useState("bs");
      const [phase, setPhase] = useState("intro");
      const [playerCount, setPlayerCount] = useState(6);
      const [names, setNames] = useState([]);
      const [players, setPlayers] = useState([]);
      const [shuffledBS] = useState(() => shuffle(QUESTIONS_BS));
      const [shuffledEN] = useState(() => shuffle(QUESTIONS_EN));
      const [qIndex, setQIndex] = useState(0);
      const [mltVotes, setMltVotes] = useState({});
      const [mltVoterIdx, setMltVoterIdx] = useState(0);
      const [isTie, setIsTie] = useState(false);
      const [hotPlayer, setHotPlayer] = useState(null);
      const [hvotes, setHvotes] = useState({});
      const [hVoterIdx, setHVoterIdx] = useState(0);
      const [nextVoterName, setNextVoterName] = useState("");
      const [passTarget, setPassTarget] = useState(null);
      const [spotlightPlayer, setSpotlightPlayer] = useState(null);
      const [spotlightHvotes, setSpotlightHvotes] = useState({});
      const [spotlightHVoterIdx, setSpotlightHVoterIdx] = useState(0);
      const [lastScorers, setLastScorers] = useState([]);

      const s = STRINGS[lang];
      const questions = lang === "bs" ? shuffledBS : shuffledEN;
      const active = players;
      const currentQ = questions[qIndex % questions.length];

      const getTally = (votes) => {
        const t = {};
        active.forEach(p => { t[p.id] = 0; });
        Object.values(votes).forEach(id => { t[id] = (t[id] || 0) + 1; });
        return [...active].map(p => ({ ...p, count: t[p.id] || 0 })).sort((a, b) => b.count - a.count);
      };

      const startGame = () => {
        const valid = names.filter(n => n.trim());
        setPlayers(valid.map((n, i) => ({ id: i, name: n.trim(), points: 0, perks: { deflect: true, pass: true, spotlight: true } })));
        setQIndex(0); setMltVotes({}); setMltVoterIdx(0);
        setHotPlayer(null); setHvotes({}); setHVoterIdx(0);
        setSpotlightPlayer(null); setSpotlightHvotes({}); setSpotlightHVoterIdx(0);
        setLastScorers([]);
        setPhase("game");
      };

      const castMlt = (targetId) => {
        const voter = active[mltVoterIdx];
        const updated = { ...mltVotes, [voter.id]: targetId };
        setMltVotes(updated);
        if (mltVoterIdx + 1 >= active.length) {
          const sorted = getTally(updated);
          setIsTie(sorted.length > 1 && sorted[0].count === sorted[1].count);
          setHotPlayer(sorted[0]);
          setPhase("mlt-result");
        } else {
          setNextVoterName(active[mltVoterIdx + 1].name);
          setPassTarget("mlt-voting");
          setMltVoterIdx(i => i + 1);
          setPhase("pass-phone");
        }
      };

      const honestyVoters = hotPlayer ? active.filter(p => p.id !== hotPlayer.id) : [];
      const currentHvoter = honestyVoters[hVoterIdx];

      const castHonesty = (verdict) => {
        const voter = honestyVoters[hVoterIdx];
        const updated = { ...hvotes, [voter.id]: verdict };
        setHvotes(updated);
        if (hVoterIdx + 1 >= honestyVoters.length) {
          setPhase("honesty-result");
        } else {
          setNextVoterName(honestyVoters[hVoterIdx + 1].name);
          setPassTarget("honesty-voting");
          setHVoterIdx(i => i + 1);
          setPhase("pass-phone");
        }
      };

      const yesCount = Object.values(hvotes).filter(v => v === "yes").length;
      const noCount = Object.values(hvotes).filter(v => v === "no").length;
      const earnedPoint = yesCount >= noCount;

      const spotlightVoters = spotlightPlayer ? active.filter(p => p.id !== spotlightPlayer.id) : [];
      const currentSpotlightVoter = spotlightVoters[spotlightHVoterIdx];
      const spYes = Object.values(spotlightHvotes).filter(v => v === "yes").length;
      const spNo = Object.values(spotlightHvotes).filter(v => v === "no").length;
      const spEarned = spYes >= spNo;

      const castSpotlightHonesty = (verdict) => {
        const voter = spotlightVoters[spotlightHVoterIdx];
        const updated = { ...spotlightHvotes, [voter.id]: verdict };
        setSpotlightHvotes(updated);
        if (spotlightHVoterIdx + 1 >= spotlightVoters.length) {
          setPhase("spotlight-result");
        } else {
          setNextVoterName(spotlightVoters[spotlightHVoterIdx + 1].name);
          setPassTarget("spotlight-hvoting");
          setSpotlightHVoterIdx(i => i + 1);
          setPhase("pass-phone");
        }
      };

      const hsPerks = players.find(p => p.id === hotPlayer?.id)?.perks || {};
      const usePerk = (playerId, perkName) => {
        setPlayers(prev => prev.map(p => p.id === playerId ? { ...p, perks: { ...p.perks, [perkName]: false } } : p));
      };

      const showLeaderboard = (extraPoints = {}) => {
        let updated = players;
        const scorers = [];
        if (earnedPoint && hotPlayer) {
          updated = updated.map(p => p.id === hotPlayer.id ? { ...p, points: p.points + 1 } : p);
          scorers.push(hotPlayer.id);
        }
        if (extraPoints.spotlightId && extraPoints.spEarned) {
          updated = updated.map(p => p.id === extraPoints.spotlightId ? { ...p, points: p.points + 1 } : p);
          scorers.push(extraPoints.spotlightId);
        }
        setPlayers(updated);
        setLastScorers(scorers);
        setPhase("round-leaderboard");
      };

      const advanceRound = () => {
        const nextQ = qIndex + 1;
        if (nextQ >= TOTAL_ROUNDS) { setPhase("scoreboard"); return; }
        setQIndex(nextQ);
        setMltVotes({}); setMltVoterIdx(0);
        setHotPlayer(null); setHvotes({}); setHVoterIdx(0);
        setSpotlightPlayer(null); setSpotlightHvotes({}); setSpotlightHVoterIdx(0);
        setLastScorers([]);
        setPhase("game");
      };

      const sorted = [...players].sort((a, b) => b.points - a.points);

      const PERKS_DEF = [
        { key: "deflect", icon: <Shuffle size={20} />, color: "#7B61FF", label: s.perkDeflect },
        { key: "pass", icon: <Ban size={20} />, color: "#FF6B35", label: s.perkPass },
        { key: "spotlight", icon: <Users size={20} />, color: "#00C9A7", label: s.perkSpotlight },
      ];

      return (
        <div className="app">
          <style>{css}</style>
          <div className="glow" style={{ width: 500, height: 500, background: "#FF3B3B", top: -200, right: -150, opacity: 0.08 }} />
          <div className="glow" style={{ width: 400, height: 400, background: "#7B2FFF", bottom: -150, left: -100, opacity: 0.07 }} />

          {phase === "intro" && (
            <div className="screen">
              <p className="eyebrow">{s.tagline}</p>
              <div className="wordmark">SURVIVOR<br /><em>VECERA</em></div>
              <p style={{ color: "#444", fontSize: 13, textAlign: "center", maxWidth: 300, lineHeight: 1.7 }}>{TOTAL_ROUNDS} {s.subtitle}</p>
              <div style={{ display: "flex", gap: 10, width: "100%", maxWidth: 420 }}>
                {["bs", "en"].map(l => (
                  <button key={l} onClick={() => setLang(l)} style={{ flex: 1, padding: "12px 0", borderRadius: 12, cursor: "pointer", fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: 14, letterSpacing: 1, textTransform: "uppercase", transition: "all 0.15s", background: lang === l ? "#FF3B3B" : "rgba(255,255,255,0.05)", border: lang === l ? "none" : "1px solid rgba(255,255,255,0.1)", color: lang === l ? "#fff" : "#666", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, WebkitTapHighlightColor: "transparent", touchAction: "manipulation" }}>
                    <Globe size={13} />{l === "bs" ? "BS" : "EN"}
                  </button>
                ))}
              </div>
              <button className="btn" onClick={() => setPhase("count")}>{s.start}</button>
              <button onClick={() => setPhase("rules")} style={{ background: "none", border: "none", color: "#444", cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: 12, letterSpacing: 2, textTransform: "uppercase", WebkitTapHighlightColor: "transparent", touchAction: "manipulation" }}>
                <BookOpen size={13} />{s.rulesBtn}
              </button>
            </div>
          )}

          {phase === "rules" && (
            <div className="rules-screen">
              <div style={{ width: "100%", maxWidth: 420, margin: "0 auto" }}>
                <button className="rback" onClick={() => setPhase("intro")}><ArrowLeft size={13} /> Back</button>
                <p className="eyebrow" style={{ marginBottom: 8 }}>{s.rulesTitle}</p>
                <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 34, lineHeight: 1, marginBottom: 24 }}>SURVIVOR<span style={{ color: "#FF3B3B" }}> VECERA</span></div>
              </div>
              <div className="rsec">
                <p className="rsec-title"><ChevronRight size={12} />{s.rulesFlow}</p>
                {s.rulesSteps.map(step => (
                  <div key={step.n} className="rstep">
                    <span className="rnum">{step.n}</span>
                    <span className="rtxt">{step.t}</span>
                  </div>
                ))}
              </div>
              <div className="rsec">
                <p className="rsec-title"><ChevronRight size={12} />{s.rulesPerks}</p>
                {[
                  { icon: <Shuffle size={18} color="#7B61FF" />, bg: "rgba(123,97,255,0.12)", name: s.perkDeflect, color: "#7B61FF", desc: lang === "bs" ? "Prebaci pitanje na drugu osobu. Oni idu na vrucu stolicu umjesto tebe." : "Redirect the hot seat to someone else. They answer instead of you." },
                  { icon: <Ban size={18} color="#FF6B35" />, bg: "rgba(255,107,53,0.12)", name: s.perkPass, color: "#FF6B35", desc: lang === "bs" ? "Odbij da odgovoris bez ikakvog objasnjenja. Automatski 0 bodova." : "Refuse to answer with no explanation. You get 0 points for the round." },
                  { icon: <Users size={18} color="#00C9A7" />, bg: "rgba(0,201,167,0.12)", name: s.perkSpotlight, color: "#00C9A7", desc: lang === "bs" ? "Odaberi nekoga ko mora odgovoriti na isto pitanje. Mogu zaraditi bod." : "Pick someone who must also answer. They can earn a point too." },
                ].map(p => (
                  <div key={p.name} className="perk-rule">
                    <div className="perk-rule-icon" style={{ background: p.bg }}>{p.icon}</div>
                    <div>
                      <div className="perk-rule-name" style={{ color: p.color }}>{p.name} <span style={{ color: "#333", fontWeight: 400 }}>1x</span></div>
                      <div className="perk-rule-desc">{p.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
              <div className="rsec">
                <p className="rsec-title"><ChevronRight size={12} />{s.rulesTips}</p>
                {s.rulesTipsList.map((tip, i) => (
                  <div key={i} className="tip-box">
                    <span style={{ color: "#FF3B3B", fontWeight: 700, flexShrink: 0 }}>{i + 1}</span>
                    <span>{tip}</span>
                  </div>
                ))}
              </div>
              <div style={{ width: "100%", maxWidth: 420, margin: "0 auto 32px" }}>
                <button className="btn" onClick={() => setPhase("intro")}>{s.start}</button>
              </div>
            </div>
          )}

          {phase === "count" && (
            <div className="screen">
              <p className="eyebrow">{s.howManyPlayers}</p>
              <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                <button onClick={() => setPlayerCount(c => Math.max(2, c - 1))} style={{ width: 56, height: 56, borderRadius: 14, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", color: "#EDEBE4", fontSize: 28, cursor: "pointer", WebkitTapHighlightColor: "transparent", touchAction: "manipulation" }}>-</button>
                <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 72, lineHeight: 1, color: "#FF3B3B", minWidth: 80, textAlign: "center" }}>{playerCount}</div>
                <button onClick={() => setPlayerCount(c => Math.min(20, c + 1))} style={{ width: 56, height: 56, borderRadius: 14, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", color: "#EDEBE4", fontSize: 28, cursor: "pointer", WebkitTapHighlightColor: "transparent", touchAction: "manipulation" }}>+</button>
              </div>
              <p style={{ color: "#444", fontSize: 13 }}>{s.playersRange}</p>
              <button className="btn" onClick={() => { setNames(Array(playerCount).fill("")); setPhase("names"); }}>{s.next}</button>
            </div>
          )}

          {phase === "names" && (
            <div className="screen">
              <p className="eyebrow">{s.whoPlays}</p>
              <div className="card scroll-list">
                {names.map((n, i) => (
                  <div className="input-row" key={i}>
                    <span className="idx">{i + 1}</span>
                    <input
                      placeholder={`${s.playerLabel} ${i + 1}`}
                      value={n}
                      onChange={e => { const c = [...names]; c[i] = e.target.value; setNames(c); }}
                      autoComplete="off"
                      autoCorrect="off"
                      autoCapitalize="words"
                      spellCheck="false"
                    />
                  </div>
                ))}
              </div>
              <button className="btn" disabled={names.filter(n => n.trim()).length < 2} onClick={startGame}>{s.letsPlay}</button>
            </div>
          )}

          {phase === "game" && (
            <div className="screen">
              <div className="prog-wrap">
                <div className="prog-label"><span>{s.round}</span><span>{qIndex + 1} / {TOTAL_ROUNDS}</span></div>
                <div className="prog-track"><div className="prog-fill" style={{ width: `${(qIndex / TOTAL_ROUNDS) * 100}%` }} /></div>
              </div>
              <div className="q-box">
                <p className="q-label">{s.mostLikelyLabel}</p>
                <p className="q-text">{currentQ.group}</p>
              </div>
              <div className="mini-score">
                {[...players].sort((a, b) => b.points - a.points).map((p, i) => (
                  <div key={p.id} className="mini-row">
                    <span style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 13, color: i === 0 && p.points > 0 ? "#FFD700" : "#333", width: 16 }}>{i + 1}</span>
                    <span style={{ flex: 1, fontSize: 14 }}>{p.name}</span>
                    <span style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 16, color: "#FF3B3B" }}>{p.points}pt</span>
                  </div>
                ))}
              </div>
              <button className="btn" onClick={() => { setMltVotes({}); setMltVoterIdx(0); setNextVoterName(active[0]?.name); setPassTarget("mlt-voting"); setPhase("pass-phone"); }}>{s.voting}</button>
            </div>
          )}

          {phase === "pass-phone" && (
            <div className="screen">
              <Smartphone size={52} color="#FF3B3B" strokeWidth={1.5} />
              <p className="eyebrow" style={{ marginBottom: 8 }}>{s.passPhone}</p>
              <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: "clamp(36px,9vw,60px)", textAlign: "center", lineHeight: 1, letterSpacing: -1 }}>{nextVoterName}</div>
              <p style={{ color: "#2a2a2a", fontSize: 13, textAlign: "center" }}>{s.passOnly} {nextVoterName} {s.passOnlySuffix}</p>
              <button className="btn" onClick={() => setPhase(passTarget)}>{s.passReady}</button>
            </div>
          )}

          {phase === "mlt-voting" && (
            <div className="screen">
              <p className="eyebrow">{s.mostLikelyLabel}</p>
              <div className="q-box"><p className="q-text">{currentQ.group}</p></div>
              <p style={{ color: "#555", fontSize: 13, textAlign: "center" }}>{s.youVote} <strong style={{ color: "#EDEBE4" }}>{active[mltVoterIdx]?.name}</strong></p>
              <div className="player-list">
                {active.filter(p => p.id !== active[mltVoterIdx]?.id).map(p => (
                  <div key={p.id} className="player-item" onClick={() => castMlt(p.id)}>
                    <div className="avatar">{p.name[0]}</div>
                    <span className="p-name">{p.name}</span>
                    <ChevronRight size={18} color="#333" />
                  </div>
                ))}
              </div>
              <p style={{ color: "#2a2a2a", fontSize: 12 }}>{mltVoterIdx + 1} / {active.length} {s.votesOf}</p>
            </div>
          )}

          {phase === "mlt-result" && hotPlayer && (
            <div className="screen">
              <p className="eyebrow">{s.voteResult}</p>
              {isTie && <div className="tie-note"><Scale size={14} />{s.tieNote}</div>}
              {getTally(mltVotes).map((p, i) => (
                <div key={p.id} className={`result-row${i === 0 ? " top" : ""}`}>
                  {i === 0 && <Flame size={18} color="#FF3B3B" />}
                  <div className="avatar" style={i === 0 ? { background: "#FF3B3B", color: "#fff" } : {}}>{p.name[0]}</div>
                  <span className="p-name">{p.name}</span>
                  <span className="result-num">{p.count}</span>
                </div>
              ))}
              <p style={{ color: "#555", fontSize: 13, textAlign: "center" }}><strong style={{ color: "#FF3B3B" }}>{hotPlayer.name}</strong> {s.groupVotedFor}</p>
              <button className="btn" onClick={() => setPhase("hotseat-wait")}>{s.hotseatBtn}</button>
            </div>
          )}

          {phase === "hotseat-wait" && hotPlayer && (
            <div className="screen">
              <div className="icon-hero"><Flame size={52} color="#FF3B3B" strokeWidth={1.5} /></div>
              <p className="eyebrow" style={{ color: "#FFB400" }}>{s.hotseat}</p>
              <div className="hs-name">{hotPlayer.name}</div>
              <div className="q-box hs">
                <p className="q-label">{s.yourQuestion}</p>
                <p className="q-text">{currentQ.hotseat}</p>
              </div>
              <div className="perk-row">
                {PERKS_DEF.map(({ key, icon, color, label }) => {
                  const available = hsPerks[key];
                  return (
                    <div key={key} className={`perk-card${available ? "" : " used"}`}
                      style={{ borderColor: available ? `${color}44` : undefined, color: available ? color : undefined }}
                      onClick={() => {
                        if (!available) return;
                        if (key === "pass") { usePerk(hotPlayer.id, "pass"); showLeaderboard(); }
                        else if (key === "deflect") { usePerk(hotPlayer.id, "deflect"); setPhase("deflect-pick"); }
                        else if (key === "spotlight") { usePerk(hotPlayer.id, "spotlight"); setPhase("spotlight-pick"); }
                      }}>
                      {icon}
                      <span className="perk-name">{label}</span>
                      <span className="perk-once">{available ? s.perkOnce : s.perkUsed}</span>
                    </div>
                  );
                })}
              </div>
              <p style={{ color: "#444", fontSize: 12, textAlign: "center", maxWidth: 300, lineHeight: 1.6 }}>{s.earnedHint} <strong style={{ color: "#34C759" }}>{s.earnedHintBonus}</strong></p>
              <button className="btn" onClick={() => { setHvotes({}); setHVoterIdx(0); const voters = active.filter(p => p.id !== hotPlayer.id); setNextVoterName(voters[0]?.name); setPassTarget("honesty-voting"); setPhase("pass-phone"); }}>{s.honestyBtn}</button>
            </div>
          )}

          {phase === "honesty-voting" && currentHvoter && (
            <div className="screen">
              <p className="eyebrow">{s.honestyVoting}</p>
              <p style={{ color: "#555", fontSize: 13, textAlign: "center" }}>{s.youVote} <strong style={{ color: "#EDEBE4" }}>{currentHvoter.name}</strong></p>
              <div className="q-box hs">
                <p className="q-label">{s.questionWas}</p>
                <p className="q-text">{currentQ.hotseat}</p>
              </div>
              <p style={{ color: "#444", fontSize: 13, textAlign: "center" }}>{s.wasHonest} <span style={{ color: "#FF3B3B" }}>{hotPlayer?.name}</span> {s.wasHonestSuffix}</p>
              <div className="vote-row">
                <button className="hbtn yes" onClick={() => castHonesty("yes")}><ThumbsUp size={28} strokeWidth={1.5} />{s.yes}</button>
                <button className="hbtn no" onClick={() => castHonesty("no")}><ThumbsDown size={28} strokeWidth={1.5} />{s.no}</button>
              </div>
              <p style={{ color: "#2a2a2a", fontSize: 12 }}>{hVoterIdx + 1} / {honestyVoters.length} {s.votesOf}</p>
            </div>
          )}

          {phase === "honesty-result" && hotPlayer && (
            <div className="screen">
              <p className="eyebrow">{s.verdict}</p>
              <div className="hs-name" style={{ color: earnedPoint ? "#34C759" : "#FF3B3B" }}>{hotPlayer.name}</div>
              <div className="tally">
                <div className="tblock"><span className="tnum" style={{ color: "#34C759" }}>{yesCount}</span><span className="tlbl"><ThumbsUp size={11} />{s.yes}</span></div>
                <div style={{ width: 1, background: "#1e1e2e", margin: "0 8px" }} />
                <div className="tblock"><span className="tnum" style={{ color: "#FF3B3B" }}>{noCount}</span><span className="tlbl"><ThumbsDown size={11} />{s.no}</span></div>
              </div>
              {earnedPoint ? <div className="banner pt"><Target size={18} />{s.earnedPoint}</div> : <div className="banner nopt"><XCircle size={18} />{s.noPoint}</div>}
              {spotlightPlayer
                ? <button className="btn" style={{ background: "#00C9A7" }} onClick={() => setPhase("spotlight-hotseat")}><Users size={16} />SPOTLIGHT: {spotlightPlayer.name}</button>
                : <button className="btn" onClick={() => showLeaderboard()}>{s.leaderboardBtn}</button>
              }
            </div>
          )}

          {phase === "deflect-pick" && hotPlayer && (
            <div className="screen">
              <Shuffle size={48} color="#7B61FF" strokeWidth={1.5} />
              <p className="eyebrow" style={{ color: "#7B61FF", marginTop: 8 }}>{s.deflectPick}</p>
              <div className="player-list">
                {active.filter(p => p.id !== hotPlayer.id).map(p => (
                  <div key={p.id} className="player-item" onClick={() => { setHotPlayer(p); setPhase("hotseat-wait"); }}>
                    <div className="avatar">{p.name[0]}</div>
                    <span className="p-name">{p.name}</span>
                    <ChevronRight size={18} color="#333" />
                  </div>
                ))}
              </div>
            </div>
          )}

          {phase === "spotlight-pick" && hotPlayer && (
            <div className="screen">
              <Users size={48} color="#00C9A7" strokeWidth={1.5} />
              <p className="eyebrow" style={{ color: "#00C9A7", marginTop: 8 }}>{s.spotlightPick}</p>
              <div className="player-list">
                {active.filter(p => p.id !== hotPlayer.id).map(p => (
                  <div key={p.id} className="player-item" onClick={() => { setSpotlightPlayer(p); setSpotlightHvotes({}); setSpotlightHVoterIdx(0); setPhase("hotseat-wait"); }}>
                    <div className="avatar">{p.name[0]}</div>
                    <span className="p-name">{p.name}</span>
                    <Users size={16} color="#00C9A7" />
                  </div>
                ))}
              </div>
            </div>
          )}

          {phase === "spotlight-hotseat" && spotlightPlayer && (
            <div className="screen">
              <Users size={52} color="#00C9A7" strokeWidth={1.5} />
              <p className="eyebrow" style={{ color: "#00C9A7" }}>SPOTLIGHT</p>
              <div className="hs-name" style={{ color: "#00C9A7" }}>{spotlightPlayer.name}</div>
              <p style={{ color: "#555", fontSize: 13, textAlign: "center" }}>{spotlightPlayer.name} {s.spotlightAnswers}</p>
              <div className="q-box sp">
                <p className="q-label">{s.yourQuestion}</p>
                <p className="q-text">{currentQ.hotseat}</p>
              </div>
              <p style={{ color: "#444", fontSize: 12, textAlign: "center", maxWidth: 300, lineHeight: 1.6 }}>{s.earnedHint} <strong style={{ color: "#34C759" }}>{s.earnedHintBonus}</strong></p>
              <button className="btn" style={{ background: "#00C9A7" }} onClick={() => { setSpotlightHvotes({}); setSpotlightHVoterIdx(0); const voters = active.filter(p => p.id !== spotlightPlayer.id); setNextVoterName(voters[0]?.name); setPassTarget("spotlight-hvoting"); setPhase("pass-phone"); }}>{s.honestyBtn}</button>
            </div>
          )}

          {phase === "spotlight-hvoting" && currentSpotlightVoter && (
            <div className="screen">
              <p className="eyebrow" style={{ color: "#00C9A7" }}>{s.honestyVoting}</p>
              <p style={{ color: "#555", fontSize: 13, textAlign: "center" }}>{s.youVote} <strong style={{ color: "#EDEBE4" }}>{currentSpotlightVoter.name}</strong></p>
              <div className="q-box sp">
                <p className="q-label">{s.questionWas}</p>
                <p className="q-text">{currentQ.hotseat}</p>
              </div>
              <p style={{ color: "#444", fontSize: 13, textAlign: "center" }}>{s.wasHonest} <span style={{ color: "#00C9A7" }}>{spotlightPlayer?.name}</span> {s.wasHonestSuffix}</p>
              <div className="vote-row">
                <button className="hbtn yes" onClick={() => castSpotlightHonesty("yes")}><ThumbsUp size={28} strokeWidth={1.5} />{s.yes}</button>
                <button className="hbtn no" onClick={() => castSpotlightHonesty("no")}><ThumbsDown size={28} strokeWidth={1.5} />{s.no}</button>
              </div>
              <p style={{ color: "#2a2a2a", fontSize: 12 }}>{spotlightHVoterIdx + 1} / {spotlightVoters.length} {s.votesOf}</p>
            </div>
          )}

          {phase === "spotlight-result" && spotlightPlayer && (
            <div className="screen">
              <p className="eyebrow" style={{ color: "#00C9A7" }}>SPOTLIGHT - {s.verdict}</p>
              <div className="hs-name" style={{ color: spEarned ? "#34C759" : "#FF3B3B" }}>{spotlightPlayer.name}</div>
              <div className="tally">
                <div className="tblock"><span className="tnum" style={{ color: "#34C759" }}>{spYes}</span><span className="tlbl"><ThumbsUp size={11} />{s.yes}</span></div>
                <div style={{ width: 1, background: "#1e1e2e", margin: "0 8px" }} />
                <div className="tblock"><span className="tnum" style={{ color: "#FF3B3B" }}>{spNo}</span><span className="tlbl"><ThumbsDown size={11} />{s.no}</span></div>
              </div>
              {spEarned ? <div className="banner pt"><Target size={18} />{s.earnedPoint}</div> : <div className="banner nopt"><XCircle size={18} />{s.noPoint}</div>}
              <button className="btn" onClick={() => showLeaderboard({ spotlightId: spotlightPlayer.id, spEarned })}>{s.leaderboardBtn}</button>
            </div>
          )}

          {phase === "round-leaderboard" && (
            <div className="screen">
              <div className="rdots">
                {Array.from({ length: TOTAL_ROUNDS }).map((_, i) => (
                  <div key={i} className={`rdot${i < qIndex ? " done" : i === qIndex ? " cur" : ""}`} />
                ))}
              </div>
              <p className="eyebrow">{s.leaderboardTitle} - {lang === "bs" ? "Nakon runde" : "After round"} {qIndex + 1}</p>
              <div style={{ width: "100%", maxWidth: 420 }}>
                {[...players].sort((a, b) => b.points - a.points).map((p, i) => {
                  const justScored = lastScorers.includes(p.id);
                  const isFirst = i === 0;
                  return (
                    <div key={p.id} className={`lb-row${justScored ? " scored" : ""}${isFirst ? " first" : ""}`}>
                      <span className={`lb-rank${isFirst ? " top" : ""}`}>{i + 1}</span>
                      <div className="avatar" style={isFirst ? { background: "#FFD700", color: "#000" } : justScored ? { background: "#34C759", color: "#fff" } : {}}>{p.name[0]}</div>
                      <span className="p-name">{p.name}{justScored && <span className="lb-badge">+1 {s.leaderboardScored}</span>}</span>
                      <span className="lb-pts">{p.points}<span style={{ fontSize: 13, color: "#555" }}>pt</span></span>
                    </div>
                  );
                })}
              </div>
              <button className="btn" onClick={advanceRound}>
                {qIndex + 1 >= TOTAL_ROUNDS ? s.leaderboardFinal : `${s.leaderboardNext} ${qIndex + 2}`}
              </button>
            </div>
          )}

          {phase === "scoreboard" && (
            <div className="screen">
              <div className="icon-hero"><Trophy size={64} color="#FFD700" strokeWidth={1.5} /></div>
              <p className="eyebrow" style={{ color: "#FFD700" }}>{s.finalResults}</p>
              <div className="wordmark" style={{ color: "#FFD700", fontSize: "clamp(34px,8vw,58px)" }}>{sorted[0]?.name}</div>
              <p style={{ color: "#555", fontSize: 13, marginBottom: 4 }}>{s.winnerSuffix} {sorted[0]?.points} {s.winnerPoints}</p>
              {sorted.map((p, i) => (
                <div key={p.id} className={`score-row${i === 0 ? " first" : ""}`}>
                  <span className="srank">{i + 1}</span>
                  <div className="avatar" style={i === 0 ? { background: "#FFD700", color: "#000" } : {}}>{p.name[0]}</div>
                  <span className="p-name">{p.name}</span>
                  <span className="spts">{p.points}pt</span>
                </div>
              ))}
              <button className="btn" style={{ marginTop: 4 }} onClick={() => { setPhase("intro"); setNames([]); setPlayers([]); setQIndex(0); setPlayerCount(6); }}>{s.playAgain}</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
